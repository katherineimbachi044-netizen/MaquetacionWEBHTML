<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos</title>

    <link rel="stylesheet" href="css/estilo_index.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<section class="cursos-destacados">

    <div class="contenedor">

        <span class="subtitulo">CURSOS DESTACADOS</span>

        <h2>Encuentra el curso perfecto para ti</h2>

        <div class="grid-cursos">

            <div class="curso">
                <img src="IMG/curso1.jpg" alt="Python">
                <div class="contenido-curso">
                    <h3>Bootcamp Completo de Python</h3>
                    <p>10 lecciones · 3h 25m</p>
                    <span class="precio">$99.99</span>
                    <button>Vista previa</button>
                </div>
            </div>

            <div class="curso">
                <img src="IMG/curso2.jpg" alt="Illustrator">
                <div class="contenido-curso">
                    <h3>Adobe Illustrator para Principiantes</h3>
                    <p>8 lecciones · 7h 59m</p>
                    <span class="precio">$119.99</span>
                    <button>Vista previa</button>
                </div>
            </div>

            <div class="curso">
                <img src="IMG/curso3.jpg" alt="Vue">
                <div class="contenido-curso">
                    <h3>Introducción a Vue.js</h3>
                    <p>25 lecciones · 17h 46m</p>
                    <span class="precio">$129.99</span>
                    <button>Vista previa</button>
                </div>
            </div>

        </div>

    </div>

</section>

</body>
</html>
